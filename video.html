function buildSchema(v){
  const url=`https://www.4kpornvideo.com/video?id=${videoId}`;
  return JSON.stringify({"@context":"https://schema.org","@type":"VideoObject","name":v.title||"","description":v.description||v.title||"","thumbnailUrl":v.thumb||"","contentUrl":v.src||"","embedUrl":url,"uploadDate":new Date().toISOString().split('T')[0],"duration":"PT"+(v.duration||'0M').replace(':','M')+'S'});
}

/* ── REC CARDS ── */
function recCardHTML(v){
  const ch=getCh(v);
  return `<div class="video-card" data-id="${v.id}" data-preview="${v.preview||''}">
    <div class="thumb-wrap" data-preview="${v.preview||''}">
      <img src="${v.thumb||''}" alt="${(v.title||'').replace(/"/g,'&quot;')}" loading="lazy" onerror="this.src='https://placehold.co/640x360/13162a/444?text=Video'" />
      <div class="badge-4k">4K</div>
      ${v.duration?`<div class="duration-badge">${v.duration}</div>`:''}
    </div>
    <div class="card-info">
      <div class="card-title">${v.title||''}</div>
      <div class="card-meta">
        <div class="card-ch"><svg viewBox="0 0 24 24"><rect x="2" y="7" width="20" height="15" rx="2"/><polyline points="17 2 12 7 7 2"/></svg>${ch||'Channel'}</div>
        <div class="card-views"><svg viewBox="0 0 24 24"><path d="M1 12s4-8 11-8 11 8 11 8-4 8-11 8-11-8-11-8z"/><circle cx="12" cy="12" r="3"/></svg>${fmtNum(v.views||0)}</div>
      </div>
    </div>
  </div>`;
}
function attachRecEvents(){
  document.querySelectorAll('.video-card').forEach(card=>{
    const id=card.dataset.id,previewUrl=card.dataset.preview,thumb=card.querySelector('.thumb-wrap');
    let previewEl=null,touchTimer=null,touchMoved=false;
    function showP(){if(!previewUrl||previewEl)return;previewEl=document.createElement('video');previewEl.src=previewUrl;previewEl.autoplay=true;previewEl.muted=true;previewEl.loop=true;previewEl.playsInline=true;previewEl.style.cssText='position:absolute;inset:0;width:100%;height:100%;object-fit:cover;z-index:1';const b=document.createElement('div');b.className='preview-badge';b.style.zIndex='3';b.innerHTML='<span class="preview-dot"></span>PREVIEW';b.id='pb_'+id;thumb.appendChild(previewEl);thumb.appendChild(b);}
    function hideP(){if(previewEl){previewEl.remove();previewEl=null;}const pb=document.getElementById('pb_'+id);if(pb)pb.remove();}
    thumb.addEventListener('mouseenter',showP);thumb.addEventListener('mouseleave',hideP);
    thumb.addEventListener('touchstart',()=>{touchMoved=false;touchTimer=setTimeout(()=>{if(!touchMoved)showP();},150);},{passive:true});
    thumb.addEventListener('touchmove',()=>{touchMoved=true;if(touchTimer)clearTimeout(touchTimer);hideP();},{passive:true});
    thumb.addEventListener('touchend',()=>{if(touchTimer)clearTimeout(touchTimer);setTimeout(hideP,600);},{passive:true});
    thumb.addEventListener('touchcancel',()=>{if(touchTimer)clearTimeout(touchTimer);hideP();},{passive:true});
    /* same-page navigation — stay inside /video/ folder */
    card.addEventListener('click',()=>location.href='?id='+id);
  });
}

/* ── HAMBURGER MENU ── */
const dropdown=document.getElementById('dropdown'),menuBtn=document.getElementById('menuBtn');
const catList=document.getElementById('catList'),catChevron=document.getElementById('catChevron');
let dropOpen=false,catOpen=false;
function closeMenu(){dropOpen=false;catOpen=false;dropdown.classList.remove('open');catList.classList.remove('open');catChevron.classList.remove('open');}
menuBtn.addEventListener('click',e=>{e.stopPropagation();dropOpen=!dropOpen;dropdown.classList.toggle('open',dropOpen);if(!dropOpen){catOpen=false;catList.classList.remove('open');catChevron.classList.remove('open');}});
document.getElementById('catToggle').addEventListener('click',e=>{e.stopPropagation();catOpen=!catOpen;catList.classList.toggle('open',catOpen);catChevron.classList.toggle('open',catOpen);});
document.addEventListener('click',e=>{if(!document.getElementById('menuWrap').contains(e.target))closeMenu();});

/* ── INLINE SEARCH ── */
const searchBar=document.getElementById('searchBar'),searchInput=document.getElementById('searchInput'),searchClear=document.getElementById('searchClear');
document.getElementById('searchBtn').addEventListener('click',()=>{searchBar.classList.toggle('open');if(searchBar.classList.contains('open'))setTimeout(()=>searchInput.focus(),60);});
searchInput.addEventListener('input',()=>{searchClear.style.display=searchInput.value?'flex':'none';});
searchClear.addEventListener('click',()=>{searchInput.value='';searchClear.style.display='none';searchInput.focus();});
document.getElementById('searchForm').addEventListener('submit',e=>{
  e.preventDefault();const q=searchInput.value.trim();
  if(q)location.href='../?q='+encodeURIComponent(q);
});

/* ── MAIN LOAD ── */
(async()=>{
  if(!videoId){location.href='../';return;}
  try{
    videoRef=doc(db,'videos',videoId);
    const vSnap=await getDoc(videoRef);
    if(!vSnap.exists()){location.href='../';return;}
    const v={id:vSnap.id,...vSnap.data()};
    const ch=getCh(v);
    currentLikes=Number(v.likes)||0;
    currentDislikes=Number(v.dislikes)||0;
    currentVote=localStorage.getItem('vote_'+videoId)||null;

    const pageUrl=`https://www.4kpornvideo.com/video?id=${videoId}`;
    document.title=(v.title||'Video')+' - 4KPornVideo | Watch Free 4K XXX HD';
    setMeta('metaDesc',v.description||v.title||'');
    setMeta('metaKeywords',v.keywords||ch||'4k porn video');
    setMeta('metaCanonical',pageUrl);
    setMeta('ogTitle',v.title||'');setMeta('ogDesc',v.description||v.title||'');
    setMeta('ogImage',v.thumb||'');setMeta('ogUrl',pageUrl);
    setMeta('twTitle',v.title||'');setMeta('twDesc',v.description||v.title||'');setMeta('twImage',v.thumb||'');
    document.getElementById('schemaScript').textContent=buildSchema(v);

    document.getElementById('mainVideo').src=v.src||'';
    document.getElementById('mainVideo').poster=v.thumb||'';
    document.getElementById('videoTitle').textContent=v.title||'';
    document.getElementById('videoViews').textContent=fmtNum(v.views||0);
    document.getElementById('channelName').textContent=ch||'Channel';
    if(localStorage.getItem('wl_'+videoId)==='1')document.getElementById('wlBtn').className='wl-btn saved';
    updateVoteUI();

    if(v.description){
      document.getElementById('descBox').style.display='block';
      const dt=document.getElementById('descText');dt.textContent=v.description;
      if(v.description.length>120){
        const btn=document.getElementById('descToggle');btn.style.display='flex';
        let exp=false;
        btn.onclick=()=>{exp=!exp;dt.className='desc-text'+(exp?' exp':'');btn.innerHTML=exp?'Show less <svg viewBox="0 0 24 24" style="width:14px;height:14px;stroke:var(--gold);fill:none;stroke-width:2;stroke-linecap:round;stroke-linejoin:round"><polyline points="18 15 12 9 6 15"/></svg>':'Show more <svg viewBox="0 0 24 24" style="width:14px;height:14px;stroke:var(--gold);fill:none;stroke-width:2;stroke-linecap:round;stroke-linejoin:round"><polyline points="6 9 12 15 18 9"/></svg>';};
      }
    }

    document.getElementById('loadingSection').style.display='none';
    document.getElementById('playerSection').style.display='block';

    /* Load recommended + categories */
    const allSnap=await getDocs(collection(db,'videos'));
    const all=allSnap.docs.filter(d=>d.id!==videoId).map(d=>({id:d.id,...d.data()}));

    /* Build category list */
    const chMap=new Map();
    all.forEach(v2=>{const c=getCh(v2);if(c&&!chMap.has(c.toLowerCase()))chMap.set(c.toLowerCase(),c);});
    const channels=[...chMap.values()].sort((a,b)=>a.toLowerCase().localeCompare(b.toLowerCase()));
    catList.innerHTML=channels.length
      ? channels.map(c=>`<a href="../?channel=${encodeURIComponent(c)}" class="cat-item">${c}</a>`).join('')
      : '<div style="padding:10px 16px;color:#555;font-size:12px">No categories</div>';

    if(all.length){
      document.getElementById('recSection').style.display='block';
      document.getElementById('recList').innerHTML=all.slice(0,20).map(recCardHTML).join('');
      attachRecEvents();
    }
  }catch(e){
    console.error(e);
    document.getElementById('loadingSection').innerHTML='<div style="text-align:center;padding:60px 20px;color:#555"><div style="font-size:44px">⚠️</div><div style="margin-top:10px">Failed to load video</div></div>';
  }
})();
</script>
