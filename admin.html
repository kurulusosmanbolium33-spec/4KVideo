<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Admin Panel - 4KPornVideo</title>
  <meta name="robots" content="noindex, nofollow" />
  <style>
    *{box-sizing:border-box;margin:0;padding:0}
    :root{--bg:#0d0f18;--card:#13162a;--border:#1e2234;--gold:#f5c518;--text:#e8e8e8;--red:#dc2626;--blue:#2563eb}
    body{background:var(--bg);color:var(--text);font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif;min-height:100vh}
    ::-webkit-scrollbar{width:4px}::-webkit-scrollbar-track{background:var(--bg)}::-webkit-scrollbar-thumb{background:#2a2d3a;border-radius:2px}

    .login-wrap{min-height:100vh;display:flex;align-items:center;justify-content:center;padding:20px}
    .login-box{width:100%;max-width:360px}
    .login-logo{text-align:center;margin-bottom:28px}
    .login-logo img{height:50px;object-fit:contain}
    .login-sub{color:#666;font-size:13px;margin-top:8px}
    .login-card{background:var(--card);border-radius:14px;padding:28px;border:1px solid var(--border)}
    .login-title{font-size:15px;font-weight:600;color:#ddd;margin-bottom:20px;text-align:center}
    input[type=password],input[type=text],input[type=url],input[type=number],textarea,select{
      width:100%;padding:10px 12px;border-radius:8px;background:#0d0f18;border:1px solid var(--border);
      color:var(--text);font-size:13px;outline:none;transition:border .2s;font-family:inherit}
    input:focus,textarea:focus{border-color:#3a3d4a}
    input.err{border-color:var(--red)}
    .err-msg{color:#f87171;font-size:12px;margin-top:5px}
    .btn-gold{width:100%;padding:13px;background:var(--gold);color:#111;border:none;border-radius:10px;font-size:15px;font-weight:700;cursor:pointer;margin-top:14px;transition:opacity .2s}
    .btn-gold:hover{opacity:.9}
    .btn-gold:disabled{opacity:.5;cursor:not-allowed}

    header{background:#090b14;border-bottom:1px solid var(--border);height:58px;display:flex;align-items:center;justify-content:space-between;padding:0 16px;position:sticky;top:0;z-index:40}
    .h-left{display:flex;align-items:center;gap:12px}
    .h-left img{height:38px;object-fit:contain}
    .admin-badge{background:#1e1a00;color:var(--gold);font-size:12px;font-weight:700;padding:3px 10px;border-radius:6px;border:1px solid #f5c51840}
    .h-btns{display:flex;gap:8px}
    .btn-add{display:flex;align-items:center;gap:6px;background:var(--gold);color:#111;border:none;padding:8px 16px;border-radius:8px;cursor:pointer;font-size:13px;font-weight:700}
    .btn-logout{display:flex;align-items:center;gap:5px;background:#1e2234;color:#999;border:none;padding:8px 12px;border-radius:8px;cursor:pointer;font-size:13px}
    svg.icon{width:15px;height:15px;stroke:currentColor;fill:none;stroke-width:2;stroke-linecap:round;stroke-linejoin:round;flex-shrink:0;vertical-align:middle}

    .main{max-width:800px;margin:0 auto;padding:16px}

    .form-card{background:var(--card);border-radius:14px;border:1px solid var(--border);padding:20px;margin-bottom:20px}
    .form-head{display:flex;justify-content:space-between;align-items:center;margin-bottom:18px}
    .form-title{font-size:15px;font-weight:600;color:#eee}
    .btn-close{background:none;border:none;cursor:pointer;color:#666;padding:4px;display:flex}
    .form-grid{display:grid;gap:12px}
    .field-label{font-size:11px;color:#666;text-transform:uppercase;letter-spacing:.5px;display:block;margin-bottom:5px}
    .form-actions{display:flex;gap:10px;margin-top:18px}
    .btn-save{flex:1;display:flex;align-items:center;justify-content:center;gap:7px;background:var(--gold);color:#111;border:none;padding:12px;border-radius:10px;font-size:14px;font-weight:700;cursor:pointer}
    .btn-save:disabled{background:#555;cursor:not-allowed}
    .btn-cancel{background:#1e2234;color:#999;border:none;padding:12px 20px;border-radius:10px;cursor:pointer;font-size:14px}

    .list-head{display:flex;justify-content:space-between;align-items:center;margin-bottom:14px}
    .list-count{color:#888;font-size:13px}
    .btn-refresh{background:none;border:none;cursor:pointer;color:#666;font-size:12px}
    .video-list{display:flex;flex-direction:column;gap:10px}
    .video-item{display:flex;align-items:center;gap:12px;background:var(--card);border:1px solid var(--border);border-radius:10px;padding:10px 12px;transition:border .2s}
    .video-item.editing{border-color:var(--gold);background:#1a1f38}
    .video-thumb{width:72px;height:42px;object-fit:cover;border-radius:5px;flex-shrink:0;background:#111}
    .video-meta{flex:1;min-width:0}
    .video-title{font-size:13px;font-weight:500;color:#ddd;overflow:hidden;white-space:nowrap;text-overflow:ellipsis}
    .video-sub{display:flex;gap:10px;margin-top:3px;font-size:11px;color:#666}
    .item-btns{display:flex;gap:6px;flex-shrink:0}
    .btn-icon{display:flex;align-items:center;padding:7px;border-radius:7px;border:none;cursor:pointer}
    .btn-view{background:#1a2040;color:#888;text-decoration:none}
    .btn-edit{background:#1a2040;color:var(--gold)}
    .btn-del{background:#2a1020;color:var(--red)}
    .btn-icon:disabled{opacity:.4;cursor:not-allowed}

    .skeleton{background:#1a1d2a;border-radius:10px;animation:sk 1.5s ease-in-out infinite}
    @keyframes sk{0%,100%{opacity:1}50%{opacity:.5}}
    @keyframes spin{to{transform:rotate(360deg)}}
    .spinning{animation:spin .8s linear infinite}

    .toast{position:fixed;top:20px;left:50%;transform:translateX(-50%);background:#1e2234;color:#fff;padding:10px 22px;border-radius:24px;font-size:13px;z-index:999;border:1px solid #2a2d3a;white-space:nowrap;display:none}
    .toast.show{display:block}
  </style>
</head>
<body>

<div id="toast" class="toast"></div>

<div id="loginSection" class="login-wrap">
  <div class="login-box">
    <div class="login-logo">
      <img src="https://i.ibb.co.com/KJR1M1S/Airbrush-IMAGE-ENHANCER-1780990857633-1780990857634.png" alt="4KPornVideo" />
      <div class="login-sub">Admin Panel</div>
    </div>
    <div class="login-card">
      <div class="login-title">🔐 Login</div>
      <input id="passInput" type="password" placeholder="Admin password" />
      <div id="passErr" class="err-msg" style="display:none">Wrong password</div>
      <button class="btn-gold" onclick="doLogin()">Login</button>
    </div>
  </div>
</div>

<div id="adminSection" style="display:none">
  <header>
    <div class="h-left">
      <img src="https://i.ibb.co.com/DPvkzX48/4kpornvideo-com.png" alt="Logo" />
      <span class="admin-badge">ADMIN</span>
    </div>
    <div class="h-btns">
      <button class="btn-add" onclick="openAdd()">
        <svg class="icon" viewBox="0 0 24 24"><line x1="12" y1="5" x2="12" y2="19"/><line x1="5" y1="12" x2="19" y2="12"/></svg>
        Add Video
      </button>
      <button class="btn-logout" onclick="doLogout()">
        <svg class="icon" viewBox="0 0 24 24"><path d="M9 21H5a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h4"/><polyline points="16 17 21 12 16 7"/><line x1="21" y1="12" x2="9" y2="12"/></svg>
        Logout
      </button>
    </div>
  </header>

  <div class="main">
    <div id="formCard" class="form-card" style="display:none">
      <div class="form-head">
        <div class="form-title" id="formTitle">➕ Add New Video</div>
        <button class="btn-close" onclick="closeForm()">
          <svg class="icon" viewBox="0 0 24 24"><line x1="18" y1="6" x2="6" y2="18"/><line x1="6" y1="6" x2="18" y2="18"/></svg>
        </button>
      </div>
      <div class="form-grid">
        <div><label class="field-label">📝 Title *</label><input id="f-title" type="text" placeholder="e.g. BLACKED RAW – Riding Home Sexy Free" /></div>
        <div><label class="field-label">🎬 Video URL *</label><input id="f-src" type="url" placeholder="https://..." /></div>
        <div><label class="field-label">🖼️ Thumbnail URL *</label><input id="f-thumb" type="url" placeholder="https://..." /></div>
        <div><label class="field-label">👁️ Preview URL (short clip)</label><input id="f-preview" type="url" placeholder="https://..." /></div>
        <div><label class="field-label">⏱️ Duration</label><input id="f-duration" type="text" placeholder="e.g. 28:14" /></div>
        <div><label class="field-label">📺 Channel</label><input id="f-channel" type="text" placeholder="e.g. BLACKED" /></div>
        <div><label class="field-label">👁️ Views</label><input id="f-views" type="number" placeholder="0" value="0" /></div>
        <div><label class="field-label">🔑 Keywords (comma separated)</label><input id="f-keywords" type="text" placeholder="blacked, interracial, 4k" /></div>
        <div><label class="field-label">📄 Description</label><textarea id="f-desc" rows="3" placeholder="Video description..."></textarea></div>
      </div>
      <div class="form-actions">
        <button class="btn-save" id="saveBtn" onclick="saveVideo()">
          <svg class="icon" viewBox="0 0 24 24"><path d="M19 21H5a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h11l5 5v11a2 2 0 0 1-2 2z"/><polyline points="17 21 17 13 7 13 7 21"/><polyline points="7 3 7 8 15 8"/></svg>
          <span id="saveBtnText">Add Video</span>
        </button>
        <button class="btn-cancel" onclick="closeForm()">Cancel</button>
      </div>
    </div>

    <div class="list-head">
      <div class="list-count" id="listCount">Loading...</div>
      <button class="btn-refresh" onclick="fetchVideos()">↻ Refresh</button>
    </div>
    <div id="videoList" class="video-list">
      <div class="skeleton" style="height:70px"></div>
      <div class="skeleton" style="height:70px"></div>
      <div class="skeleton" style="height:70px"></div>
    </div>
  </div>
</div>

<script type="module">
import { initializeApp } from "https://www.gstatic.com/firebasejs/11.8.1/firebase-app.js";
import { getFirestore, collection, getDocs, addDoc, deleteDoc, updateDoc, doc, serverTimestamp, orderBy, query } from "https://www.gstatic.com/firebasejs/11.8.1/firebase-firestore.js";

const PASS = "Admin@4k2024";
const SK = "adm_sess_4k";
const app = initializeApp({
  apiKey:"AIzaSyBYNU7wTq9_1-TdIVuG-yxAlKjeFb9Rm_M",
  authDomain:"video-cms-b7c1e.firebaseapp.com",
  projectId:"video-cms-b7c1e",
  storageBucket:"video-cms-b7c1e.firebasestorage.app",
  messagingSenderId:"991575420179",
  appId:"1:991575420179:web:23459a09aa36f868e37ee6"
});
const db = getFirestore(app);

let videos = [], editId = null;

function showToast(msg) {
  const t=document.getElementById('toast');
  t.textContent=msg; t.classList.add('show');
  setTimeout(()=>t.classList.remove('show'),2500);
}

window.doLogin = function() {
  const val = document.getElementById('passInput').value;
  if (val === PASS) {
    sessionStorage.setItem(SK,'1');
    document.getElementById('loginSection').style.display='none';
    document.getElementById('adminSection').style.display='block';
    fetchVideos();
  } else {
    const pi=document.getElementById('passInput');
    pi.classList.add('err');
    document.getElementById('passErr').style.display='block';
    setTimeout(()=>{ pi.classList.remove('err'); document.getElementById('passErr').style.display='none'; },2000);
  }
};
document.getElementById('passInput').addEventListener('keydown',e=>{ if(e.key==='Enter') window.doLogin(); });

window.doLogout = function() {
  sessionStorage.removeItem(SK);
  location.href='index.html';
};

if (sessionStorage.getItem(SK)==='1') {
  document.getElementById('loginSection').style.display='none';
  document.getElementById('adminSection').style.display='block';
  fetchVideos();
}

window.fetchVideos = async function() {
  document.getElementById('videoList').innerHTML='<div class="skeleton" style="height:70px"></div>'.repeat(3);
  document.getElementById('listCount').textContent='Loading...';
  try {
    const snap = await getDocs(query(collection(db,'videos'), orderBy('title')));
    videos = snap.docs.map(d=>({id:d.id,...d.data()}));
    renderList();
  } catch(e) {
    console.error(e);
    showToast('❌ Failed to load. Check Firestore rules.');
    document.getElementById('listCount').textContent='Error';
    document.getElementById('videoList').innerHTML='';
  }
};

function renderList() {
  document.getElementById('listCount').textContent=`${videos.length} video${videos.length!==1?'s':''}`;
  const fmtNum=n=>{ n=parseInt(n)||0; if(n>=1e6)return(n/1e6).toFixed(1)+'M'; if(n>=1e3)return(n/1e3).toFixed(0)+'K'; return String(n); };
  const getCh=v=>(v.channel||v.tag||'').trim();
  document.getElementById('videoList').innerHTML = videos.length===0
    ? '<div style="text-align:center;padding:60px 20px;color:#555">No videos yet. Click <strong>Add Video</strong> to start.</div>'
    : videos.map(v=>`
    <div class="video-item${editId===v.id?' editing':''}" id="item-${v.id}">
      <img class="video-thumb" src="${v.thumb||''}" alt="" onerror="this.src='https://placehold.co/72x42/111/444?text=img'" />
      <div class="video-meta">
        <div class="video-title">${v.title||'Untitled'}</div>
        <div class="video-sub">
          <span>📺 ${getCh(v)||'—'}</span>
          <span>⏱ ${v.duration||'—'}</span>
          <span>👍 ${v.likes||0} 👎 ${v.dislikes||0} 👁 ${fmtNum(v.views||0)}</span>
        </div>
      </div>
      <div class="item-btns">
        <a href="video.html?id=${v.id}" target="_blank" class="btn-icon btn-view">
          <svg class="icon" viewBox="0 0 24 24"><path d="M1 12s4-8 11-8 11 8 11 8-4 8-11 8-11-8-11-8z"/><circle cx="12" cy="12" r="3"/></svg>
        </a>
        <button class="btn-icon btn-edit" onclick="openEdit('${v.id}')">
          <svg class="icon" viewBox="0 0 24 24"><path d="M11 4H4a2 2 0 0 0-2 2v14a2 2 0 0 0 2 2h14a2 2 0 0 0 2-2v-7"/><path d="M18.5 2.5a2.121 2.121 0 0 1 3 3L12 15l-4 1 1-4 9.5-9.5z"/></svg>
        </button>
        <button class="btn-icon btn-del" onclick="deleteVideo('${v.id}')">
          <svg class="icon" viewBox="0 0 24 24"><polyline points="3 6 5 6 21 6"/><path d="M19 6l-1 14a2 2 0 0 1-2 2H8a2 2 0 0 1-2-2L5 6"/><path d="M10 11v6"/><path d="M14 11v6"/><path d="M9 6V4h6v2"/></svg>
        </button>
      </div>
    </div>`).join('');
}

window.openAdd = function() {
  editId=null;
  ['title','src','thumb','preview','duration','channel','keywords'].forEach(k=>document.getElementById('f-'+k).value='');
  document.getElementById('f-views').value='0';
  document.getElementById('f-desc').value='';
  document.getElementById('formTitle').textContent='➕ Add New Video';
  document.getElementById('saveBtnText').textContent='Add Video';
  document.getElementById('formCard').style.display='block';
  window.scrollTo({top:0,behavior:'smooth'});
  setTimeout(()=>document.getElementById('f-title').focus(),100);
};

window.openEdit = function(id) {
  const v = videos.find(x=>x.id===id);
  if (!v) return;
  editId = id;
  document.getElementById('f-title').value=v.title||'';
  document.getElementById('f-src').value=v.src||'';
  document.getElementById('f-thumb').value=v.thumb||'';
  document.getElementById('f-preview').value=v.preview||'';
  document.getElementById('f-duration').value=v.duration||'';
  document.getElementById('f-channel').value=(v.channel||v.tag||'').trim();
  document.getElementById('f-views').value=v.views||0;
  document.getElementById('f-keywords').value=v.keywords||'';
  document.getElementById('f-desc').value=v.description||'';
  document.getElementById('formTitle').textContent='✏️ Edit Video';
  document.getElementById('saveBtnText').textContent='Update Video';
  document.getElementById('formCard').style.display='block';
  renderList();
  window.scrollTo({top:0,behavior:'smooth'});
};

window.closeForm = function() {
  editId=null;
  document.getElementById('formCard').style.display='none';
  renderList();
};

window.saveVideo = async function() {
  const title=document.getElementById('f-title').value.trim();
  const src=document.getElementById('f-src').value.trim();
  const thumb=document.getElementById('f-thumb').value.trim();
  if (!title||!src||!thumb) { showToast('⚠️ Title, Video URL and Thumbnail required'); return; }
  const btn=document.getElementById('saveBtn');
  btn.disabled=true;
  document.getElementById('saveBtnText').textContent='Saving...';
  try {
    const data={
      title, src, thumb,
      preview: document.getElementById('f-preview').value.trim(),
      duration: document.getElementById('f-duration').value.trim(),
      channel: document.getElementById('f-channel').value.trim(),
      views: parseInt(document.getElementById('f-views').value)||0,
      keywords: document.getElementById('f-keywords').value.trim(),
      description: document.getElementById('f-desc').value.trim(),
      likes: 0, dislikes: 0,
    };
    if (editId) {
      await updateDoc(doc(db,'videos',editId), data);
      showToast('✅ Video updated!');
    } else {
      await addDoc(collection(db,'videos'),{...data,createdAt:serverTimestamp()});
      showToast('✅ Video added!');
    }
    closeForm();
    fetchVideos();
  } catch(e) {
    console.error(e);
    showToast('❌ Failed. Check Firestore write rules.');
  } finally {
    btn.disabled=false;
    document.getElementById('saveBtnText').textContent = editId?'Update Video':'Add Video';
  }
};

window.deleteVideo = async function(id) {
  if (!confirm('Delete this video permanently?')) return;
  try {
    await deleteDoc(doc(db,'videos',id));
    videos=videos.filter(v=>v.id!==id);
    showToast('🗑️ Deleted');
    renderList();
  } catch(e) {
    console.error(e);
    showToast('❌ Delete failed. Check Firestore rules.');
  }
};
</script>
</body>
</html>
